<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HILD Drop Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #c41e3a 0%, #d63447 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
        }
        .container { text-align: center; }
        .logo { font-size: 3.5rem; font-weight: 900; letter-spacing: 4px; font-family: 'Georgia', 'Garamond', serif; margin-bottom: 0.5rem; }
        .subtitle { font-size: 1rem; font-weight: 700; color: #fbbf24; letter-spacing: 2px; margin-bottom: 3rem; }
        .card { background: rgba(255,255,255,0.1); padding: 2rem; border-radius: 16px; max-width: 300px; }
        .card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; }
        .btn { width: 100%; padding: 1rem; background: white; border: none; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; color: #c41e3a; text-decoration: none; display: block; text-align: center; }
        .message { margin-top: 1rem; font-size: 0.85rem; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">HILD</div>
        <div class="subtitle">LANDSCAPING</div>
        <div class="card">
            <div class="card-title">Sign in with Google</div>
            <a class="btn" href="https://accounts.google.com/o/oauth2/v2/auth?client_id=106680855644-fflm2tto6tg1ngvk82v23ms4npu02kso.apps.googleusercontent.com&redirect_uri=https://pmf6h4zy28-lgtm.github.io/metro_drop_planner.html&response_type=code&scope=https://www.googleapis.com/auth/drive.appfolder&access_type=offline&prompt=consent">Sign In</a>
            <div class="message">One-time login</div>
        </div>
    </div>
</body>
</html>

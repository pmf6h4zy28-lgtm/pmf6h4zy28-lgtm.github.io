    <div id="loginScreen" class="card">

        <div class="message">One-time login required</div>

    <div id="loadingScreen" class="card" style="display: none;">
        <div class="card-title">Authenticating...</div>
        <div class="message">Please wait...</div>
    </div>
</div>

<script>
    // Check for OAuth code in URL
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    
    if (code) {
        // Show loading screen
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('loadingScreen').style.display = 'block';
        
        console.log('✅ Got authorization code!');
        localStorage.setItem('googleAccessToken', code);
        
        // Redirect to app
        setTimeout(() => {
            window.location.href = '/metro_drop_planner.html';
        }, 500);
    } else {
        // Check if already logged in
        const token = localStorage.getItem('googleAccessToken');
        if (token) {
            console.log('✅ Already logged in, going to app');
            window.location.href = '/metro_drop_planner.html';
        }
        // If no token and no code, show login screen (already visible by default)
    }
</script>
